name: Deploy Backend to Elastic Beanstalk

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend-elastic-beanstalk.yml"
  workflow_dispatch:

concurrency:
  group: elastic-beanstalk-backend
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  EB_APPLICATION_NAME: ${{ vars.EB_APPLICATION_NAME }}
  EB_ENVIRONMENT_NAME: ${{ vars.EB_ENVIRONMENT_NAME }}
  DEPLOY_PACKAGE: backend-deploy.zip

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Test backend
        working-directory: backend
        run: go test ./...

      - name: Validate Elastic Beanstalk variables
        run: |
          test -n "$EB_APPLICATION_NAME" || (echo "Set GitHub repository variable EB_APPLICATION_NAME" && exit 1)
          test -n "$EB_ENVIRONMENT_NAME" || (echo "Set GitHub repository variable EB_ENVIRONMENT_NAME" && exit 1)

      - name: Build deployment package
        working-directory: backend
        run: zip -r "../${DEPLOY_PACKAGE}" . -x "*.env*" "uploads/*" "tmp/*" "vendor/*"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to Elastic Beanstalk
        uses: aws-actions/aws-elasticbeanstalk-deploy@v1.0.4
        with:
          aws-region: ${{ env.AWS_REGION }}
          application-name: ${{ env.EB_APPLICATION_NAME }}
          environment-name: ${{ env.EB_ENVIRONMENT_NAME }}
          deployment-package-path: ${{ env.DEPLOY_PACKAGE }}
          version-label: backend-${{ github.sha }}-${{ github.run_attempt }}
          create-application-if-not-exists: false
          create-environment-if-not-exists: false
          wait-for-deployment: true
          wait-for-environment-recovery: true
          deployment-timeout: 1800
          max-retries: 5
          retry-delay: 10
          use-existing-application-version-if-available: false
          option-settings: |
            [
              {
                "Namespace": "aws:elasticbeanstalk:environment:process:default",
                "OptionName": "HealthCheckPath",
                "Value": "/api/health"
              }
            ]
