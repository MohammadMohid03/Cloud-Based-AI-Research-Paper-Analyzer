version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rpa-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-research_paper_analyzer}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - rpa-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rpa-backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-research_paper_analyzer}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - S3_BUCKET=${S3_BUCKET:-}
      - BEDROCK_MODEL_ID=${BEDROCK_MODEL_ID:-anthropic.claude-3-sonnet-20240229-v1:0}
      - AI_PROVIDER=${AI_PROVIDER:-mock}
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-local}
      - SERVER_PORT=8080
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - rpa-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rpa-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - rpa-network

volumes:
  postgres_data:
  uploads_data:

networks:
  rpa-network:
    driver: bridge
